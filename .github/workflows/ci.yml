name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # astral-sh/setup-uv@v6 still ships its action under Node.js 20. Opt into
  # Node.js 24 here so the GitHub deprecation annotation goes away. Drop
  # this when setup-uv publishes a Node.js 24 release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: lint + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install project (with dev extras)
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: Mypy (type check)
        run: uv run mypy .

      - name: Pytest (with 85% coverage floor)
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=85

  docker-build:
    name: docker build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: cfn-security-auditor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
